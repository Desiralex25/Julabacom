<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgv" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0D1B2A"/><stop offset="100%" stop-color="#1565C0"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgv)"/>
  <!-- Grille holographique -->
  <g stroke="rgba(32,114,175,0.3)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Écrans flottants avec produits -->
  <rect x="80" y="150" width="180" height="140" rx="16" fill="rgba(32,114,175,0.6)" stroke="#2072AF" stroke-width="2"/>
  <circle cx="170" cy="195" r="35" fill="#E53935" opacity="0.9"/>
  <text x="170" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">Tomates - 350F/kg</text>
  <rect x="310" y="120" width="180" height="140" rx="16" fill="rgba(32,114,175,0.6)" stroke="#2072AF" stroke-width="2"/>
  <ellipse cx="400" cy="168" rx="30" ry="22" fill="#FBC02D" opacity="0.9"/>
  <text x="400" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">Maïs - 500F/kg</text>
  <rect x="540" y="150" width="180" height="140" rx="16" fill="rgba(32,114,175,0.6)" stroke="#2072AF" stroke-width="2"/>
  <ellipse cx="630" cy="198" rx="25" ry="32" fill="#558B2F" opacity="0.9"/>
  <text x="630" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">Gombo - 150F/tas</text>
  <!-- Ligne de connexion -->
  <path d="M170 295 Q290 340 400 300 Q500 260 630 300" stroke="#2072AF" stroke-width="2" stroke-dasharray="6 3" fill="none" opacity="0.6"/>
  <!-- Points lumineux -->
  <circle cx="170" cy="295" r="6" fill="#90CAF9"/>
  <circle cx="400" cy="265" r="6" fill="#90CAF9"/>
  <circle cx="630" cy="295" r="6" fill="#90CAF9"/>
  <!-- Carte Afrique stylisée en fond -->
  <path d="M350 380 Q380 360 400 370 Q430 355 440 380 Q445 410 430 430 Q410 450 400 445 Q380 445 360 425 Q345 405 350 380Z" fill="rgba(32,114,175,0.2)" stroke="rgba(32,114,175,0.4)" stroke-width="2"/>
  <!-- Nœuds réseau -->
  <circle cx="200" cy="450" r="12" fill="#2072AF" stroke="#90CAF9" stroke-width="2"/>
  <circle cx="600" cy="450" r="12" fill="#2072AF" stroke="#90CAF9" stroke-width="2"/>
  <circle cx="400" cy="520" r="12" fill="#2072AF" stroke="#90CAF9" stroke-width="2"/>
  <line x1="200" y1="450" x2="600" y2="450" stroke="#90CAF9" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="450" x2="400" y2="520" stroke="#90CAF9" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="450" x2="400" y2="520" stroke="#90CAF9" stroke-width="1" opacity="0.4"/>
</svg>
