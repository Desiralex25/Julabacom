<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <rect width="400" height="260" rx="20" fill="#1565C0"/>
  <rect x="8" y="8" width="384" height="244" rx="16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Drapeau CI -->
  <rect x="20" y="20" width="20" height="35" fill="#F96A00"/>
  <rect x="40" y="20" width="20" height="35" fill="white"/>
  <rect x="60" y="20" width="20" height="35" fill="#009A00"/>
  <!-- Titre -->
  <text x="200" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.9)" letter-spacing="1">CÔTE D'IVOIRE</text>
  <text x="200" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" letter-spacing="2">CARTE NATIONALE D'IDENTITÉ</text>
  <!-- Photo placeholder -->
  <rect x="20" y="65" width="85" height="105" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <circle cx="62" cy="100" r="22" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="62" cy="130" rx="28" ry="15" fill="rgba(255,255,255,0.15)"/>
  <!-- Champs -->
  <text x="120" y="82" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">NOM / NAME</text>
  <rect x="120" y="86" width="200" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  <text x="120" y="108" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">PRÉNOMS / FIRST NAMES</text>
  <rect x="120" y="112" width="200" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  <text x="120" y="134" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">DATE DE NAISSANCE</text>
  <rect x="120" y="138" width="150" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  <text x="120" y="160" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">N° IDENTITÉ</text>
  <rect x="120" y="164" width="200" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>
  <!-- Bande magnétique -->
  <rect x="20" y="185" width="360" height="22" rx="4" fill="rgba(0,0,0,0.4)"/>
  <!-- Code barre stylisé -->
  <g fill="rgba(255,255,255,0.5)">
    <rect x="30" y="215" width="2" height="25"/>
    <rect x="35" y="215" width="4" height="25"/>
    <rect x="42" y="215" width="2" height="25"/>
    <rect x="47" y="215" width="5" height="25"/>
    <rect x="55" y="215" width="2" height="25"/>
    <rect x="60" y="215" width="3" height="25"/>
    <rect x="66" y="215" width="2" height="25"/>
    <rect x="71" y="215" width="4" height="25"/>
    <rect x="78" y="215" width="2" height="25"/>
  </g>
  <text x="200" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" letter-spacing="1">CARTE NATIONALE D'IDENTITÉ BIOMÉTRIQUE</text>
</svg>
