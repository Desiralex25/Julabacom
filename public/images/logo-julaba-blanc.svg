<svg width="280" height="100" viewBox="0 0 280 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo professionnel JÙLABA avec icône -->
  
  <!-- Icône stylisée à gauche -->
  <g transform="translate(10, 25)">
    <!-- Cercle principal -->
    <circle cx="25" cy="25" r="23" stroke="white" stroke-width="3" fill="none" opacity="0.9"/>
    
    <!-- Motif intérieur - représente les acteurs connectés -->
    <circle cx="25" cy="15" r="4" fill="white"/>
    <circle cx="15" cy="28" r="4" fill="white"/>
    <circle cx="35" cy="28" r="4" fill="white"/>
    <circle cx="25" cy="35" r="4" fill="white"/>
    
    <!-- Lignes de connexion -->
    <line x1="25" y1="15" x2="15" y2="28" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="25" y1="15" x2="35" y2="28" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="15" y1="28" x2="25" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="28" x2="25" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Texte JÙLABA -->
  <text x="75" y="62" font-family="Calisga Bold, Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" letter-spacing="2">
    JÙLABA
  </text>
  
  <!-- Accent sous le texte -->
  <rect x="75" y="72" width="185" height="4" fill="white" opacity="0.8" rx="2"/>
  
  <!-- Baseline - Plateforme -->
  <text x="75" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.85" letter-spacing="1.5">
    PLATEFORME NATIONALE VIVRIER
  </text>
</svg>
